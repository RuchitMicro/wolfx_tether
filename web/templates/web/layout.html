<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOLFx: IT Company</title>
    <link rel="icon" type="image/x-icon" href="{%if setting.favicon%}{{setting.favicon.url|default_if_none:''|default:''}}{%endif%}">
    {%load static%}

    {{setting.global_head|safe}}

    {%if local_head%}
        {{local_head.head|safe}}
    {%endif%}

    {%include 'web/dependencies.html'%}
    <link rel="stylesheet" href="{%static 'web/css/main.css'%}">
    <link rel="stylesheet" href="{%static 'web/css/style.css'%}">
</head>

<body class="tether-body">
    <div class="page-wrap">
        <header class="topbar">
            <div class="brand">TETHER</div>
            <div class="btn-row">
                <a href="{% url 'logout' %}" class="btn danger">Logout</a>
            </div>
        </header>
   
        <main class="main">
            {%block content%}
            {%endblock%}
        </main>
    </div>
</body>

</html>
