<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TETHER — Logged Out</title>
    {%load static%}
    <link rel="stylesheet" href="{%static 'web/css/tether.css'%}">
</head>

<body class="tether-body">
    <div class="page-wrap">
        <header class="topbar">
            <div class="brand">TETHER</div>
        </header>

        <div class="logout-wrap">
            <div class="logout-card">
                <div class="logout-card-brand">
                    <h1>TETHER</h1>
                    <p>Session ended</p>
                </div>
                <div class="logout-card-body">
                    <p>You have been securely logged out. Your session has been terminated.</p>
                    <a href="{% url 'login' %}" class="btn primary">Sign in again</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
