{%load static%}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TETHER — Login</title>
    <link rel="icon" type="image/x-icon" href="{%if setting.favicon%}{{setting.favicon.url|default_if_none:''|default:''}}{%endif%}">
    {{setting.global_head|safe}}
    {%if local_head%}{{local_head.head|safe}}{%endif%}
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            background: #0d0e11;
            font-family: 'Inter', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #0d0e11;
            position: relative;
            overflow: hidden;
        }

        .login-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            opacity: 1;
            filter: saturate(0.4) brightness(0.8);
            pointer-events: none;
        }

        .login-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.25); /* much lighter */
            z-index: 1;
        }

        .login-card {
            position: relative;
            z-index: 2;
            width: 320px;
            background: #13151a;
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .login-card-top {
            padding: 24px 24px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .login-card-top h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.22em;
            color: #e8eaf0;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0 0 5px;
        }

        .login-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4f8ef7;
            box-shadow: 0 0 0 3px rgba(79,142,247,0.15);
            flex-shrink: 0;
        }

        .login-card-top p {
            font-size: 12px;
            color: #555a6e;
            padding-left: 18px;
        }

        .login-card-body {
            padding: 20px 24px 24px;
        }

        .login-card-body form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .login-field {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .login-field label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            color: #8b90a0;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .login-field input {
            display: block;
            width: 100%;
            height: 38px;
            padding: 0 12px;
            background: #1a1d24;
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 8px;
            color: #e8eaf0;
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .login-field input:focus {
            border-color: rgba(79,142,247,0.5);
            box-shadow: 0 0 0 3px rgba(79,142,247,0.12);
        }

        .login-error {
            font-size: 12px;
            color: #f56565;
            background: rgba(245,101,101,0.10);
            border: 1px solid rgba(245,101,101,0.25);
            border-radius: 8px;
            padding: 8px 12px;
        }

        .login-submit {
            display: block;
            width: 100%;
            height: 38px;
            background: #4f8ef7;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
        }

        .login-submit:hover { background: #6ba1f9; }
        .login-submit:active { background: #3d7ef5; transform: scale(0.98); }
    </style>
</head>

<body>
    <div class="login-container">
        <video src="{%static 'web/video/bg-3.mp4'%}" autoplay muted loop playsinline></video>
        <div class="login-overlay"></div>

        <div class="login-card">
            <div class="login-card-top">
                <h1><span class="login-dot"></span>TETHER</h1>
                <p>Secure host terminal access</p>
            </div>
            <div class="login-card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="login-field">
                        <label for="{{ form.username.id_for_label }}">Username</label>
                        {{ form.username }}
                    </div>
                    <div class="login-field">
                        <label for="{{ form.password.id_for_label }}">Password</label>
                        {{ form.password }}
                    </div>
                    {% if form.errors %}
                    <div class="login-error">Invalid username or password.</div>
                    {% endif %}
                    <button type="submit" class="login-submit">Sign in</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
